name: IHP SG13G2
version: "1.0"

suites:
  - name: main
    path: suites/main.yml
    description: Full DRC - every per-layer deck
  - name: core
    path: suites/core.yml
    description: Geometric DRC - main minus antenna and density/fill
  - name: precheck
    path: suites/precheck.yml
    description: IHP open-source precheck subset
  - name: density
    path: suites/density.yml
    description: Dummy-fill density checks
  - name: antenna
    path: suites/antenna.yml
    description: Antenna checks only

decks:
  - name: offgrid
    path: decks/offgrid.yml
    description: Off-grid geometry (5 nm grid)
  - name: forbidden
    path: decks/forbidden.yml
    description: Forbidden layers
  - name: pin
    path: decks/pin.yml
    description: Pins and labels
  - name: lbe
    path: decks/lbe.yml
    description: LBE layer
  - name: pad
    path: decks/pad.yml
    description: Bond pads

  - name: activ
    path: decks/activ.yml
    description: Active area
  - name: tgo
    path: decks/tgo.yml
    description: Thick gate oxide (HV devices)
  - name: gatpoly
    path: decks/gatpoly.yml
    description: Gate poly
  - name: extblock
    path: decks/extblock.yml
    description: Extension-implant block (EXTBlock)
  - name: cont
    path: decks/cont.yml
    description: Contacts
  - name: contbar
    path: decks/contbar.yml
    description: Contact bars
  - name: salblock
    path: decks/salblock.yml
    description: Salicide block
  - name: nsdblock
    path: decks/nsdblock.yml
    description: n+ S/D implant block
  - name: psd
    path: decks/psd.yml
    description: p+ S/D implant (pSD)
  - name: resistor
    path: decks/resistor.yml
    description: Poly resistors (Rsil/Rppd/Rhigh)
  - name: nmosi
    path: decks/nmosi.yml
    description: Isolated NMOS (nBuLay-isolated PWell)
  - name: npn
    path: decks/npn.yml
    description: Bipolar npn HBT (npnG2, npn13G2/L/V)
  - name: sdiod
    path: decks/sdiod.yml
    description: Schottky diode (nBuLay/PWell:block/nSD:block/SalBlock ContBar)
  - name: nwell
    path: decks/nwell.yml
    description: N-well
  - name: pwellblock
    path: decks/pwellblock.yml
    description: P-well block
  - name: nbulay
    path: decks/nbulay.yml
    description: N-buried layer
  - name: nbulayblock
    path: decks/nbulayblock.yml
    description: N-buried-layer block
  - name: metal1
    path: decks/metal1.yml
    description: Metal 1
  - name: metal2
    path: decks/metal2.yml
    description: Metal 2
  - name: metal3
    path: decks/metal3.yml
    description: Metal 3
  - name: metal4
    path: decks/metal4.yml
    description: Metal 4
  - name: metal5
    path: decks/metal5.yml
    description: Metal 5
  - name: via1
    path: decks/via1.yml
    description: Via 1
  - name: via2
    path: decks/via2.yml
    description: Via 2
  - name: via3
    path: decks/via3.yml
    description: Via 3
  - name: via4
    path: decks/via4.yml
    description: Via 4
  - name: topvia1
    path: decks/topvia1.yml
    description: Top via 1
  - name: topmetal1
    path: decks/topmetal1.yml
    description: Top metal 1
  - name: topvia2
    path: decks/topvia2.yml
    description: Top via 2
  - name: topmetal2
    path: decks/topmetal2.yml
    description: Top metal 2
  - name: passiv
    path: decks/passiv.yml
    description: Passivation
  - name: sealring
    path: decks/sealring.yml
    description: Seal ring
  - name: slit
    path: decks/slit.yml
    description: Metal slotting (slits)
  - name: lu
    path: decks/lu.yml
    description: Latch-up
  - name: antenna
    path: decks/antenna.yml
    description: Antenna (Ant.a–i, full §7.1)
  - name: mim
    path: decks/mim.yml
    description: MIM capacitor

# Connect graph for net extraction (antenna checks, §7.1).  Ordered: a net-aware check
# can partition over any prefix (e.g. "everything up to Metal2") for the per-level ratio.
connectivity:
  - connector: Cont
    layers: [GatPoly]
  - connector: Cont
    layers: [Activ]
  - connector: Cont
    layers: [Metal1]
  - connector: Via1
    layers: [Metal1]
  - connector: Via1
    layers: [Metal2]
  - connector: Via2
    layers: [Metal2]
  - connector: Via2
    layers: [Metal3]
  - connector: Via3
    layers: [Metal3]
  - connector: Via3
    layers: [Metal4]
  - connector: Via4
    layers: [Metal4]
  - connector: Via4
    layers: [Metal5]
  - connector: TopVia1
    layers: [Metal5]
  - connector: TopVia1
    layers: [TopMetal1]
  - connector: TopVia2
    layers: [TopMetal1]
  - connector: TopVia2
    layers: [TopMetal2]

virtual_layers:
  - name: Pad
    op: union
    layers:
      - Passiv
      - Passiv.sbump
      - Passiv.pillar
      - dfpad
  # Device recognition: pad = passivation-type marker AND dfpad (intersection, not union).
  - name: SBumpPad
    op: intersection
    layers:
      - Passiv.sbump
      - dfpad
  - name: CuPillarPad
    op: intersection
    layers:
      - Passiv.pillar
      - dfpad
  # Padb.f/Padc.f: only circles/octagons are allowed passivation-opening shapes.
  - name: SBumpPadBadShape
    op: not_circle_or_octagon
    mode: lazy
    layers: [SBumpPad]
  - name: CuPillarPadBadShape
    op: not_circle
    mode: lazy
    layers: [CuPillarPad]
  # Padc.d: pad-anchored 30 µm reach — grows the sparse pad instead of giving dense Activ
  # a 30 µm halo. radius 29.995 + grow's 5 dbu margin = an exact 30.000 reach.
  - name: CuPillarPadGrown
    op: grow
    mode: lazy
    radius: 29.995
    layers: [CuPillarPad]
  - name: PadcDBad
    op: intersection
    mode: lazy
    layers: [CuPillarPadGrown, SealActiv]

  # The seal ring is a continuous Cont/via band that legitimately fails exact_width;
  # checking the NoSealring variant skips it without globally silencing the periphery.
  - name: ContNoSealring
    op: difference
    mode: lazy
    layers:
      - Cont
      - EdgeSeal

  - name: Via1NoSealring
    op: difference
    mode: lazy
    layers: [Via1, EdgeSeal]
  - name: Via2NoSealring
    op: difference
    mode: lazy
    layers: [Via2, EdgeSeal]
  - name: Via3NoSealring
    op: difference
    mode: lazy
    layers: [Via3, EdgeSeal]
  - name: Via4NoSealring
    op: difference
    mode: lazy
    layers: [Via4, EdgeSeal]
  - name: TopVia1NoSealring
    op: difference
    mode: lazy
    layers: [TopVia1, EdgeSeal]
  - name: TopVia2NoSealring
    op: difference
    mode: lazy
    layers: [TopVia2, EdgeSeal]

  # Passiv inside the (hole-filled) seal ring — Pad.c isn't checked outside the seal.
  - name: PassivInSeal
    op: inside
    layers: [Passiv, EdgeSeal]

  # TM2.bR (wide-line spacing) is not checked inside inductor (IND) regions.
  - name: TopMetal2NotIND
    op: difference
    mode: lazy
    layers: [TopMetal2, IND]

  # Salicidable area (diffusion + gate poly); Sal.d treats them together.
  - name: ActivOrGatPoly
    op: union
    mode: lazy
    layers: [Activ, GatPoly]

  # Square vs. bar contacts, on the seal-excluded Conts (else the seal band reads as one
  # giant bar). Used by Cnt.e–Cnt.j (square) and CntB.e–CntB.j (bar).
  - name: ContSquare
    op: square
    mode: lazy
    layers: [ContNoSealring]
  - name: ContBar
    op: not_square
    mode: lazy
    layers: [ContNoSealring]

  - name: ContOnGatPoly
    op: intersection
    mode: lazy
    layers: [ContSquare, GatPoly]
  - name: ContOnActiv
    op: intersection
    mode: lazy
    layers: [ContSquare, Activ]
  # SRAM macros use foundry-qualified bit cells that waive several FEOL rules. The
  # exclusion goes on the side that makes the rule silent (measured/enclosed, or the
  # well side for spacings) — excluding the enclosing side instead would fabricate FPs.
  - name: ContOnActivNoSRAM
    op: not_interacting
    mode: lazy
    layers: [ContOnActiv, SRAM]
  - name: ContOnNsdActiv
    op: intersection
    mode: lazy
    layers: [ContSquare, Activ, nSD]
  - name: ContOnPsdActiv
    op: intersection
    mode: lazy
    layers: [ContSquare, Activ, pSD]

  - name: ContBarOnGatPoly
    op: intersection
    mode: lazy
    layers: [ContBar, GatPoly]
  - name: ContBarOnActiv
    op: intersection
    mode: lazy
    layers: [ContBar, Activ]
  - name: ContBarOnNsdActiv
    op: intersection
    mode: lazy
    layers: [ContBar, Activ, nSD]
  - name: ContBarOnPsdActiv
    op: intersection
    mode: lazy
    layers: [ContBar, Activ, pSD]

  # P+/N+ Activ (∩pSD/∩nSD), split by ThickGateOx. NW.c: NWell enclosure of P+ tap.
  # NW.d: NWell space to external N+ (min_space already skips overlapping shapes).
  - name: PsdActivInNWell
    op: intersection
    mode: lazy
    layers: [Activ, pSD, NWell]
  - name: PsdActivInNWellTGO
    op: intersection
    mode: lazy
    layers: [PsdActivInNWell, ThickGateOx]
  - name: PsdActivInNWellNoTGO
    op: difference
    mode: lazy
    layers: [PsdActivInNWell, ThickGateOx]
  - name: NsdActiv
    op: intersection
    mode: lazy
    layers: [Activ, nSD]
  - name: NsdActivTGO
    op: intersection
    mode: lazy
    layers: [NsdActiv, ThickGateOx]
  - name: NsdActivNoTGO
    op: difference
    mode: lazy
    layers: [NsdActiv, ThickGateOx]
  # Full derived N+ for NW.d/d1: undoped Activ is N+ by default, nSD:block suppresses it,
  # drawn nSD overrides the block — drawn-nSD-only would miss almost every real N+ region.
  - name: ActivDefaultN
    op: difference
    mode: lazy
    layers: [Activ, nSD.block, pSD]
  - name: NActFull
    op: union
    mode: lazy
    layers: [NsdActiv, ActivDefaultN]
  - name: NActFullNoTGO
    op: difference
    mode: lazy
    layers: [NActFull, ThickGateOx]
  - name: NActFullTGO
    op: intersection
    mode: lazy
    layers: [NActFull, ThickGateOx]
  # N+ diffusion for the latch-up deck: IHP marks only P+ (pSD), so N+ = Activ − pSD.
  - name: NActiv
    op: difference
    mode: lazy
    layers: [Activ, pSD]
  # NWell tie (N+Activ in NWell — no NMOS lives in an NWell, so this is all tap).
  - name: NActivInNWell
    op: intersection
    mode: lazy
    layers: [NActiv, NWell]
  - name: NActivInNWellNoTGO
    op: difference
    mode: lazy
    layers: [NActivInNWell, ThickGateOx]
  - name: NActivInNWellTGO
    op: intersection
    mode: lazy
    layers: [NActivInNWell, ThickGateOx]
  - name: NActivInPWell
    op: difference
    mode: lazy
    layers: [NActiv, NWell]
  # Chapter 8 DigiBnd: inside the digital boundary, the HV NWell rules relax to LV values
  # (NW.c1/d1/e1 → .dig at 0.31/0.31/0.24).
  - name: PsdActivInNWellTGOAna
    op: not_interacting
    mode: lazy
    layers: [PsdActivInNWellTGO, DigiBnd]
  - name: PsdActivInNWellTGODig
    op: interacting
    mode: lazy
    layers: [PsdActivInNWellTGO, DigiBnd]
  - name: NActFullTGOAna
    op: not_interacting
    mode: lazy
    layers: [NActFullTGO, DigiBnd]
  - name: NActFullTGODig
    op: interacting
    mode: lazy
    layers: [NActFullTGO, DigiBnd]
  - name: NActivInNWellTGOAna
    op: not_interacting
    mode: lazy
    layers: [NActivInNWellTGO, DigiBnd]
  - name: NActivInNWellTGODig
    op: interacting
    mode: lazy
    layers: [NActivInNWellTGO, DigiBnd]
  # pSD.c requires pSD to enclose only the NWell Activ parts that actually touch it
  # (bare N+ NWell taps are skipped).
  - name: ActivInNWell
    op: intersection
    mode: lazy
    layers: [Activ, NWell]
  # pSD.i/i1/j/j1 ignore SRAM bit cells.
  - name: pSDNoSRAM
    op: difference
    mode: lazy
    layers: [pSD, SRAM]
  # pSD.g: abutted-tie taps (NWell/PWell tie Activ minus Gate, outside SRAM) below
  # 0.09 µm² can't form a reliable electrical tie.
  - name: Gate
    op: intersection
    mode: lazy
    layers: [Activ, GatPoly]
  - name: NTapNoGate
    op: difference
    mode: lazy
    layers: [NActivInNWell, Gate]
  - name: PTapNoGate
    op: difference
    mode: lazy
    layers: [PsdActivInPWell, Gate]
  - name: NTapNoGateOutSRAM
    op: not_interacting
    mode: lazy
    layers: [NTapNoGate, SRAM]
  - name: PTapNoGateOutSRAM
    op: not_interacting
    mode: lazy
    layers: [PTapNoGate, SRAM]
  # pSD.e: an abutted-tie P+ overlap sliver must be ≥0.30 wide at ONE position (inverse of
  # min_width) — implemented as morphological open: a sliver that vanishes under open(r)
  # has no ≥2r-wide spot. r = 0.149 (not 0.150) so exactly-0.30 survives, ≤0.295 dies.
  - name: ActivNoSRAM
    op: difference
    mode: lazy
    layers: [Activ, SRAM]
  - name: ActivOutsidePsd
    op: difference
    mode: lazy
    layers: [ActivNoSRAM, pSD]
  - name: ActivStraddlePsd
    op: interacting
    mode: lazy
    layers: [ActivNoSRAM, ActivOutsidePsd]
  - name: TieCandidate
    op: interacting
    mode: lazy
    layers: [ActivStraddlePsd, pSD]
  - name: TieOverlap
    op: intersection
    mode: lazy
    layers: [TieCandidate, pSD]
  - name: TieOverlapOpened
    op: open
    mode: lazy
    radius: 0.149
    layers: [TieOverlap]
  - name: TieTooNarrow
    op: not_interacting
    mode: lazy
    layers: [TieOverlap, TieOverlapOpened]
  # LU.c/d reference only a tie's own contacts, to stay sparse.
  - name: ContOnNWellTie
    op: intersection
    mode: lazy
    layers: [Cont, NActivInNWell]

  # P+/N+ Activ in the PWell (substrate) region, for PWB.e/e1/f/f1.
  - name: PsdActiv
    op: intersection
    mode: lazy
    layers: [Activ, pSD]
  - name: NsdActivInPWell
    op: difference
    mode: lazy
    layers: [NsdActiv, NWell]
  - name: NsdActivInPWellTGO
    op: intersection
    mode: lazy
    layers: [NsdActivInPWell, ThickGateOx]
  - name: NsdActivInPWellNoTGO
    op: difference
    mode: lazy
    layers: [NsdActivInPWell, ThickGateOx]
  - name: PsdActivInPWell
    op: difference
    mode: lazy
    layers: [PsdActiv, NWell]
  - name: ContOnSubstrateTie
    op: intersection
    mode: lazy
    layers: [Cont, PsdActivInPWell]
  - name: PsdActivInPWellTGO
    op: intersection
    mode: lazy
    layers: [PsdActivInPWell, ThickGateOx]
  - name: PsdActivInPWellNoTGO
    op: difference
    mode: lazy
    layers: [PsdActivInPWell, ThickGateOx]

  # pSD.f: an abutted NWell-tie N-tap must extend ≥0.30 past the P+ abutment at ONE
  # position. grow(0.0) turns the zero-area abutment into an overlap (grow's 5 dbu
  # margin); grow(0.29) reaches 0.295, so a surviving NTapDeep sliver means >0.295 deep.
  - name: NActivX1
    op: intersection
    mode: lazy
    layers: [NActiv, NWellOrPWellBlk]
  - name: PsdActivX1
    op: intersection
    mode: lazy
    layers: [PsdActiv, NWellOrPWellBlk]
  - name: PsdActivX1Touch
    op: grow
    mode: lazy
    radius: 0.0
    layers: [PsdActivX1]
  - name: AbuttedNTap
    op: interacting
    mode: lazy
    layers: [NActivX1, PsdActivX1Touch]
  - name: PsdActivX1Grown
    op: grow
    mode: lazy
    radius: 0.29
    layers: [PsdActivX1]
  - name: NTapDeep
    op: difference
    mode: lazy
    layers: [AbuttedNTap, PsdActivX1Grown]
  - name: PsdFBad
    op: not_interacting
    mode: lazy
    layers: [AbuttedNTap, NTapDeep]
  # pSD.c1: Activ touching pSD, clipped to the implicit PWell (chip minus NWell/
  # PWell:block), outside the edge seal.
  - name: ActivTouchPsd
    op: interacting
    mode: lazy
    layers: [Activ, pSD]
  - name: PsdC1Target
    op: difference
    mode: lazy
    layers: [ActivTouchPsd, NWell, PWell.block, EdgeSeal]

  # --- Poly-resistor recognition (chapter 6, §6.x) ---
  # Resistor body: GatPoly or the dedicated PolyRes layer.
  - name: GatPolyRes
    op: union
    mode: lazy
    layers: [GatPoly, PolyRes]
  - name: SalBlockClean
    op: difference
    mode: lazy
    layers: [SalBlock, Recog.esd, nSD.block]
  # pSD ∩ nSD marks the Rhigh body (nSD is drawn only inside Rhigh resistors).
  - name: pSDnSD
    op: intersection
    mode: lazy
    layers: [pSD, nSD]
  - name: RhighA
    op: intersection
    mode: lazy
    layers: [GatPolyRes, pSDnSD, SalBlockClean]
  - name: SalBlockRhigh
    op: intersection
    mode: lazy
    layers: [SalBlock, RhighA]
  # Rsil (RES/silicide resistor): drops bodies touching NWell or nBuLay.
  - name: RsilBase
    op: intersection
    mode: lazy
    layers: [GatPolyRes, RES, EXTBlock]
  - name: RsilAll
    op: not_interacting
    mode: lazy
    layers: [RsilBase, SalBlock]
  - name: RsilNotNWell
    op: not_interacting
    mode: lazy
    layers: [RsilAll, NWell]
  - name: Rsil
    op: not_interacting
    mode: lazy
    layers: [RsilNotNWell, nBuLay]
  - name: GPRsilExtended
    op: covering
    mode: lazy
    layers: [GatPolyRes, Rsil]
  # Rsil.c: RES (a back-annotation marker) must not extend past the resistor's GatPoly
  # body at all, except where a Cont lands on the protrusion. Direction confirmed against
  # the real tool: RES past GatPoly flags; GatPoly past RES does not.
  - name: RsilResProtrusion
    op: difference
    mode: lazy
    layers: [RES, GPRsilExtended]
  - name: RsilResProtrusionNoCont
    op: not_interacting
    mode: lazy
    layers: [RsilResProtrusion, Cont]
  # Rppd (P+ poly resistor): GatPoly under pSD+SalBlock not touching diffusion/nSD.
  - name: Rppd0
    op: intersection
    mode: lazy
    layers: [GatPolyRes, pSD, SalBlockClean]
  - name: ActivOrNsd
    op: union
    mode: lazy
    layers: [Activ, nSD]
  - name: RppdAll
    op: not_interacting
    mode: lazy
    layers: [Rppd0, ActivOrNsd]
  - name: GPRppdExtended
    op: covering
    mode: lazy
    layers: [GatPolyRes, RppdAll]
  - name: SalBlockRppd
    op: intersection
    mode: lazy
    layers: [SalBlock, RppdAll]
  # Rppd.c: the relevant Cont is only the one on the resistor's own GatPoly end-cap, not
  # any Cont merely within the EXTBlock.
  - name: RppdCont
    op: intersection
    mode: lazy
    layers: [Cont, GPRppdExtended]
  # Rppd.c's max-space half ("Cont within 0.20 of SalBlock") is a whole-region touch test,
  # not an area-coverage test: grow SalBlockRppd by the rule value, flag Conts that still
  # don't touch it.
  - name: SalBlockRppdGrown
    op: grow
    mode: lazy
    radius: 0.20
    layers: [SalBlockRppd]
  - name: RppdContTooFar
    op: not_interacting
    mode: lazy
    layers: [RppdCont, SalBlockRppdGrown]
  - name: GPRhighExtended
    op: covering
    mode: lazy
    layers: [GatPolyRes, RhighA]
  # Rhi.d: same Cont-on-GatPoly pattern as Rppd.c, for the Rhigh body.
  - name: RhighCont
    op: intersection
    mode: lazy
    layers: [Cont, GPRhighExtended]
  - name: SalBlockRhighGrown
    op: grow
    mode: lazy
    radius: 0.20
    layers: [SalBlockRhigh]
  - name: RhighContTooFar
    op: not_interacting
    mode: lazy
    layers: [RhighCont, SalBlockRhighGrown]
  # Rhi.b: drawn nSD sticking out past pSD, flagged where it touches the Rhigh
  # recognition (grown a hair so zero-area abutment is detectable).
  - name: NsdMismatch
    op: difference
    mode: lazy
    layers: [nSD, pSD]
  - name: RhighRecogBase
    op: intersection
    mode: lazy
    layers: [EXTBlock, pSDnSD]
  - name: RhighRecog
    op: covering
    mode: lazy
    layers: [RhighRecogBase, GatPoly]
  - name: RhighRecogGrown
    op: grow
    mode: lazy
    radius: 0.0
    layers: [RhighRecog]
  - name: NsdMismatchAtRhigh
    op: interacting
    mode: lazy
    layers: [NsdMismatch, RhighRecogGrown]

  # --- Bipolar npn (chapter 6.1) recognition ---
  # NPN substrate tie: the interior (`holes`) of its pSD ring, labelled "npn*".  radius =
  # max expected tie-ring extent (the hole only materialises where the whole ring
  # assembles in one tile bucket).
  - name: PsdRingHole
    op: holes
    mode: lazy
    radius: 10.0
    layers: [pSD]
  - name: NpnTieHole
    op: with_text
    mode: lazy
    layers: [PsdRingHole, TEXT]
    text: "npn*"
  - name: NpnTieNoTrans
    op: not_interacting
    mode: lazy
    layers: [NpnTieHole, TRANS]
  - name: TransInTie
    op: interacting
    mode: lazy
    layers: [TRANS, NpnTieHole]
  - name: NpnTieHoleGrown
    op: grow
    mode: lazy
    radius: 0.5
    layers: [NpnTieHole]
  - name: NpnTieRingActiv
    op: interacting
    mode: lazy
    layers: [PsdActiv, NpnTieHoleGrown]
  - name: GatPolyNoSRAM
    op: difference
    mode: lazy
    layers: [GatPoly, SRAM]
  # Device flavours by exact TRANS text label.
  - name: TransG2
    op: with_text
    mode: lazy
    layers: [TRANS, TEXT]
    text: "npn13G2"
  - name: TransG2L
    op: with_text
    mode: lazy
    layers: [TRANS, TEXT]
    text: "npn13G2L"
  - name: TransG2V
    op: with_text
    mode: lazy
    layers: [TRANS, TEXT]
    text: "npn13G2V"
  - name: EmitG2
    op: interacting
    mode: lazy
    layers: [EmWind, TransG2]
  - name: EmitG2L
    op: interacting
    mode: lazy
    layers: [EmWind, TransG2L]
  - name: EmitG2V
    op: interacting
    mode: lazy
    layers: [EmWind, TransG2V]

  # --- Schottky diode (chapter 6.7) recognition ---
  # schottky_nbl1 = ContBar enclosed by (SalBlock and nSD:block and PWell:block and nBuLay).
  - name: SchottkyBlock
    op: intersection
    mode: lazy
    layers: [SalBlock, nSD.block, PWell.block, nBuLay]
  - name: SchottkyContBar
    op: interacting
    mode: lazy
    layers: [ContBar, SchottkyBlock]

  # --- Isolated-NMOS (nmosi) recognition (chapter 6) ---
  # Iso-PWell-Activ = Activ inside the buried layer but outside any NWell / PWell:block.
  - name: NWellOrPWellBlk
    op: union
    mode: lazy
    layers: [NWell, PWell.block]
  - name: ActivInNBuLay
    op: intersection
    mode: lazy
    layers: [Activ, nBuLay]
  - name: IsoPWellAct
    op: difference
    mode: lazy
    layers: [ActivInNBuLay, NWellOrPWellBlk]
  - name: NWellNBuLay
    op: intersection
    mode: lazy
    layers: [NWell, nBuLay]
  - name: nSDBlockIso
    op: interacting
    mode: lazy
    layers: [nSD.block, IsoPWellAct]
  # nmosi.c anchor: only ring-shaped NWells count — a plain NWell near some iso-PWell
  # Activ is not the isolation ring.
  - name: NWellRing
    op: with_holes
    mode: lazy
    radius: 10.0
    layers: [NWell]
  # nmosi.g: SalBlock must extend ≥0.15 past nSD:block wherever the adjacent ground is
  # still Activ. grow radius 0.145 + its 5 dbu margin = an effective 0.150 band, so a
  # compliant 0.15 extension yields an empty band while 0.145 leaves a sliver.
  - name: SalBlockIso
    op: interacting
    mode: lazy
    layers: [SalBlock, IsoPWellAct]
  - name: NSDBlockIsoGrown
    op: grow
    mode: lazy
    radius: 0.145
    layers: [nSDBlockIso]
  - name: NSDBlockUncov
    op: difference
    mode: lazy
    layers: [NSDBlockIsoGrown, SalBlockIso]
  - name: NmosiGBad
    op: intersection
    mode: lazy
    layers: [NSDBlockUncov, Activ]

  # AFil.j: Activ:filler inside PWell:block, enclosed by (nSD:block ∩ SalBlock) by 0.25 µm.
  - name: ActivFillerInPWellBlock
    op: intersection
    mode: lazy
    layers: [Activ.filler, PWell.block]
  - name: nSDBlockAndSalBlock
    op: intersection
    mode: lazy
    layers: [nSD.block, SalBlock]

  # ThickGateOx helpers, for the TGO.b/d "space … outside TGO" rules.
  - name: GatPolyOverActiv
    op: intersection
    mode: lazy
    layers: [GatPoly, Activ]
  - name: ThickGateOxOverActiv
    op: intersection
    mode: lazy
    layers: [ThickGateOx, Activ]
  - name: ActivOutsideTGO
    op: difference
    mode: lazy
    layers: [Activ, ThickGateOx]
  - name: GatPolyOverActivOutsideTGO
    op: difference
    mode: lazy
    layers: [GatPolyOverActiv, ThickGateOx]
  - name: GatPolyOverActivTGO
    op: intersection
    mode: lazy
    layers: [GatPolyOverActiv, ThickGateOx]

  # Same-net merge for NW.b/NBL.b "different net" spacing: a morphological close joins
  # regions whose gap is below the same-net distance (half the close radius), so
  # min_space on the result only flags genuinely separate (different-net) regions.
  - name: NWellMerged
    op: close
    mode: lazy
    radius: 0.31
    layers: [NWell]
  - name: NWellNoSRAM
    op: difference
    mode: lazy
    layers: [NWell, SRAM]
  - name: NWellMergedNoSRAM
    op: close
    mode: lazy
    radius: 0.31
    layers: [NWellNoSRAM]
  - name: PsdActivInNWellNoTGONoSRAM
    op: not_interacting
    mode: lazy
    layers: [PsdActivInNWellNoTGO, SRAM]
  - name: nBuLayMerged
    op: close
    mode: lazy
    radius: 0.75
    layers: [nBuLay]

  # Seal-ring rings: each conductor inside the EdgeSeal frame. Seal.a/c/c1/c2/c3 check
  # their width; Seal.d the Activ-ring enclosure of the via rings.
  - name: SealActiv
    op: intersection
    mode: lazy
    layers: [Activ, EdgeSeal]
  - name: SealpSD
    op: intersection
    mode: lazy
    layers: [pSD, EdgeSeal]
  - name: SealMetal1
    op: intersection
    mode: lazy
    layers: [Metal1, EdgeSeal]
  - name: SealMetal2
    op: intersection
    mode: lazy
    layers: [Metal2, EdgeSeal]
  - name: SealMetal3
    op: intersection
    mode: lazy
    layers: [Metal3, EdgeSeal]
  - name: SealMetal4
    op: intersection
    mode: lazy
    layers: [Metal4, EdgeSeal]
  - name: SealMetal5
    op: intersection
    mode: lazy
    layers: [Metal5, EdgeSeal]
  - name: SealTopMetal1
    op: intersection
    mode: lazy
    layers: [TopMetal1, EdgeSeal]
  - name: SealTopMetal2
    op: intersection
    mode: lazy
    layers: [TopMetal2, EdgeSeal]
  - name: SealCont
    op: intersection
    mode: lazy
    layers: [Cont, EdgeSeal]
  - name: SealVia1
    op: intersection
    mode: lazy
    layers: [Via1, EdgeSeal]
  - name: SealVia2
    op: intersection
    mode: lazy
    layers: [Via2, EdgeSeal]
  - name: SealVia3
    op: intersection
    mode: lazy
    layers: [Via3, EdgeSeal]
  - name: SealVia4
    op: intersection
    mode: lazy
    layers: [Via4, EdgeSeal]
  - name: SealTopVia1
    op: intersection
    mode: lazy
    layers: [TopVia1, EdgeSeal]
  - name: SealTopVia2
    op: intersection
    mode: lazy
    layers: [TopVia2, EdgeSeal]

  # Passivation ring outside the seal (Seal.e/f), approximated as Passiv not interacting
  # EdgeSeal since `with_holes` can't be a virtual layer here (a chip-perimeter hole isn't
  # tile-local). Caveat: a thin non-ring Passiv shape outside the seal would over-flag.
  - name: RingPassiv
    op: not_interacting
    mode: lazy
    layers: [Passiv, EdgeSeal]

  # Pad opening, for Pad.a1/d width/space rules.
  - name: PassivDfpad
    op: intersection
    mode: lazy
    layers: [Passiv, dfpad]
  # Pad.i: a dfpad opening drawn without TopMetal2 underneath is a forbidden marker error.
  - name: DfpadNoTopMetal2
    op: difference
    mode: lazy
    layers: [dfpad, TopMetal2]

  # Gate-length-by-device helpers (Gat.a1–a4): split by S/D implant and ThickGateOx.
  - name: GatPolyOverNsdActiv
    op: intersection
    mode: lazy
    layers: [GatPoly, Activ, nSD]
  - name: GatPolyOverNsdActivTGO
    op: intersection
    mode: lazy
    layers: [GatPolyOverNsdActiv, ThickGateOx]
  - name: GatPolyOverNsdActivNoTGO
    op: difference
    mode: lazy
    layers: [GatPolyOverNsdActiv, ThickGateOx]
  - name: GatPolyOverPsdActiv
    op: intersection
    mode: lazy
    layers: [GatPoly, Activ, pSD]
  - name: GatPolyOverPsdActivTGO
    op: intersection
    mode: lazy
    layers: [GatPolyOverPsdActiv, ThickGateOx]
  - name: GatPolyOverPsdActivNoTGO
    op: difference
    mode: lazy
    layers: [GatPolyOverPsdActiv, ThickGateOx]

  # Metal with the slit-exempt regions removed (pads/MIM/IND), for Slt.c/Slt.i.
  - name: Metal1NoExempt
    op: difference
    mode: lazy
    layers: [Metal1, Passiv, MIM, IND]
  - name: Metal2NoExempt
    op: difference
    mode: lazy
    layers: [Metal2, Passiv, MIM, IND]
  - name: Metal3NoExempt
    op: difference
    mode: lazy
    layers: [Metal3, Passiv, MIM, IND]
  - name: Metal4NoExempt
    op: difference
    mode: lazy
    layers: [Metal4, Passiv, MIM, IND]
  - name: Metal5NoExempt
    op: difference
    mode: lazy
    layers: [Metal5, Passiv, MIM, IND]
  - name: TopMetal1NoExempt
    op: difference
    mode: lazy
    layers: [TopMetal1, Passiv, MIM, IND]
  - name: TopMetal2NoExempt
    op: difference
    mode: lazy
    layers: [TopMetal2, Passiv, MIM, IND]
  # Slt.e: drawn slits must not land on a pad (every dfpad shape touching a Passiv opening).
  - name: PadDfpad
    op: interacting
    mode: lazy
    layers: [dfpad, Passiv]
  - name: Metal1SlitOnPad
    op: intersection
    mode: lazy
    layers: [Metal1.slit, PadDfpad]
  - name: Metal2SlitOnPad
    op: intersection
    mode: lazy
    layers: [Metal2.slit, PadDfpad]
  - name: Metal3SlitOnPad
    op: intersection
    mode: lazy
    layers: [Metal3.slit, PadDfpad]
  - name: Metal4SlitOnPad
    op: intersection
    mode: lazy
    layers: [Metal4.slit, PadDfpad]
  - name: Metal5SlitOnPad
    op: intersection
    mode: lazy
    layers: [Metal5.slit, PadDfpad]
  - name: TopMetal1SlitOnPad
    op: intersection
    mode: lazy
    layers: [TopMetal1.slit, PadDfpad]
  - name: TopMetal2SlitOnPad
    op: intersection
    mode: lazy
    layers: [TopMetal2.slit, PadDfpad]

  # --- Antenna (§7.1) ---
  # P+ diffusion contact area (Activ that is not gate, and is pSD). Ant.i flags a diode on
  # it landing in the PWell (neither NWell nor an explicit PWell.block) — a p-diode may
  # only sit in an NWell.
  - name: ActivNotGat
    op: difference
    mode: lazy
    layers: [Activ, GatPoly]
  - name: PActivCon
    op: intersection
    mode: lazy
    layers: [ActivNotGat, pSD]
  - name: AntDpDiode
    op: intersection
    mode: lazy
    layers: [PActivCon, Recog.diode]
  - name: AntIError
    op: difference
    mode: lazy
    layers: [AntDpDiode, Recog.esd, NWell, PWell.block]

  # Antenna ratio helpers (Ant.b/e, Ant.d/f): a net's diffusion diode is any non-gate
  # Activ contact, the discharge path that relaxes the ratio limit.
  - name: NActivCon
    op: difference
    mode: lazy
    layers: [Activ, GatPoly, pSD, nSD.block]
  - name: AntDiode
    op: union
    mode: lazy
    layers: [NActivCon, PActivCon]
  # Ant.a: GatPoly routed over field oxide (not over Activ).
  - name: AntPolyField
    op: difference
    mode: lazy
    layers: [GatPoly, Activ]

  # Protection-diode devices (Ant.g): an n-diode is an n-diffusion under a diode marker
  # outside the NWell; a p-diode is a p-diffusion marker inside the NWell.
  - name: AntDnDiode
    op: intersection
    mode: lazy
    layers: [NActivCon, Recog.diode]
  - name: AntDantenna
    op: difference
    mode: lazy
    layers: [AntDnDiode, NWell]
  - name: AntDpantenna
    op: intersection
    mode: lazy
    layers: [PActivCon, Recog.diode, NWell]

