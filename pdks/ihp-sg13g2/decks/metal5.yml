rules:
  - id: M5.a
    check: min_width
    layers: [Metal5]
    value: 0.20
  - id: M5.b
    check: min_space
    layers: [Metal5]
    value: 0.21
  - id: M5.b
    check: min_notch
    layers: [Metal5]
    value: 0.21
  - id: M5.c
    check: min_enclosure
    layers: [Metal5, Via4NoSealring]
    value: 0.005
  - id: M5.c1
    check: min_endcap_enclosure
    layers: [Metal5, Via4NoSealring]
    value: 0.05
  - id: M5.d
    check: min_area
    layers: [Metal5]
    value: 0.144
  - id: M5.e
    check: min_space_prl
    layers: [Metal5]
    value: 0.24
    params:
      wide_width: 0.39
      parallel_run: 1.00
  - id: M5.f
    check: min_space_prl
    layers: [Metal5]
    value: 0.60
    params:
      wide_width: 10.00
      parallel_run: 10.00
  - id: M5.g
    check: min_45_width
    layers: [Metal5]
    value: 0.24
    params:
      bent_length: 0.50
  - id: M5.i
    check: min_space_bent
    layers: [Metal5]
    value: 0.24
  - id: M5.j
    check: min_density
    layers: [Metal5, Metal5.filler, Metal5.mask]
    value: 35.00
    params:
      boundary_layer: 39
      boundary_datatype: 4
  - id: M5.k
    check: max_density
    layers: [Metal5, Metal5.filler, Metal5.mask]
    value: 60.00
    params:
      boundary_layer: 39
      boundary_datatype: 4

  - id: M5Fil.a1
    check: min_width
    layers: [Metal5.filler]
    value: 1.00
  - id: M5Fil.a2
    check: max_width
    layers: [Metal5.filler]
    value: 5.00
  - id: M5Fil.b
    check: min_space
    layers: [Metal5.filler]
    value: 0.42
  - id: M5Fil.c
    check: min_space
    layers: [Metal5.filler, Metal5]
    value: 0.42
  - id: M5Fil.d
    check: min_space
    layers: [Metal5.filler, TRANS]
    value: 1.00
  - id: M5Fil.h
    check: min_windowed_density
    layers: [Metal5, Metal5.filler, Metal5.mask]
    value: 25.00
    params:
      window: 800.0
      boundary_layer: 39
      boundary_datatype: 4
  - id: M5Fil.k
    check: max_windowed_density
    layers: [Metal5, Metal5.filler, Metal5.mask]
    value: 75.00
    params:
      window: 800.0
      boundary_layer: 39
      boundary_datatype: 4
