rules:
  - id: M2.a
    check: min_width
    layers: [Metal2]
    value: 0.20
  - id: M2.b
    check: min_space
    layers: [Metal2]
    value: 0.21
  - id: M2.b
    check: min_notch
    layers: [Metal2]
    value: 0.21
  - id: M2.c
    check: min_enclosure
    layers: [Metal2, Via1NoSealring]
    value: 0.005
  - id: M2.c1
    check: min_endcap_enclosure
    layers: [Metal2, Via1NoSealring]
    value: 0.05
  - id: M2.d
    check: min_area
    layers: [Metal2]
    value: 0.144
  - id: M2.e
    check: min_space_prl
    layers: [Metal2]
    value: 0.24
    params:
      wide_width: 0.39
      parallel_run: 1.00
  - id: M2.f
    check: min_space_prl
    layers: [Metal2]
    value: 0.60
    params:
      wide_width: 10.00
      parallel_run: 10.00
  - id: M2.g
    check: min_45_width
    layers: [Metal2]
    value: 0.24
    params:
      bent_length: 0.50
  - id: M2.i
    check: min_space_bent
    layers: [Metal2]
    value: 0.24
  - id: M2.j
    check: min_density
    layers: [Metal2, Metal2.filler, Metal2.mask]
    value: 35.00
    params:
      boundary_layer: 39
  - id: M2.k
    check: max_density
    layers: [Metal2, Metal2.filler, Metal2.mask]
    value: 60.00
    params:
      boundary_layer: 39

  - id: M2Fil.a1
    check: min_width
    layers: [Metal2.filler]
    value: 1.00
  - id: M2Fil.a2
    check: max_width
    layers: [Metal2.filler]
    value: 5.00
  - id: M2Fil.b
    check: min_space
    layers: [Metal2.filler]
    value: 0.42
  - id: M2Fil.c
    check: min_space
    layers: [Metal2.filler, Metal2]
    value: 0.42
  - id: M2Fil.d
    check: min_space
    layers: [Metal2.filler, TRANS]
    value: 1.00
  - id: M2Fil.h
    check: min_windowed_density
    layers: [Metal2, Metal2.filler, Metal2.mask]
    value: 25.00
    params:
      window: 800.0
      boundary_layer: 39
  - id: M2Fil.k
    check: max_windowed_density
    layers: [Metal2, Metal2.filler, Metal2.mask]
    value: 75.00
    params:
      window: 800.0
      boundary_layer: 39
