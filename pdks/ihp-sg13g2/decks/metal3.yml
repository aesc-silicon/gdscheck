rules:
  - id: M3.a
    check: min_width
    layers: [Metal3]
    value: 0.20
  - id: M3.b
    check: min_space
    layers: [Metal3]
    value: 0.21
  - id: M3.b
    check: min_notch
    layers: [Metal3]
    value: 0.21
  - id: M3.c
    check: min_enclosure
    layers: [Metal3, Via2NoSealring]
    value: 0.005
  - id: M3.c1
    check: min_endcap_enclosure
    layers: [Metal3, Via2NoSealring]
    value: 0.05
  - id: M3.d
    check: min_area
    layers: [Metal3]
    value: 0.144
  - id: M3.e
    check: min_space_prl
    layers: [Metal3]
    value: 0.24
    params:
      wide_width: 0.39
      parallel_run: 1.00
  - id: M3.f
    check: min_space_prl
    layers: [Metal3]
    value: 0.60
    params:
      wide_width: 10.00
      parallel_run: 10.00
  - id: M3.g
    check: min_45_width
    layers: [Metal3]
    value: 0.24
    params:
      bent_length: 0.50
  - id: M3.i
    check: min_space_bent
    layers: [Metal3]
    value: 0.24
  - id: M3.j
    check: min_density
    layers: [Metal3, Metal3.filler, Metal3.mask]
    value: 35.00
    params:
      boundary_layer: 39
      boundary_datatype: 4
  - id: M3.k
    check: max_density
    layers: [Metal3, Metal3.filler, Metal3.mask]
    value: 60.00
    params:
      boundary_layer: 39
      boundary_datatype: 4

  - id: M3Fil.a1
    check: min_width
    layers: [Metal3.filler]
    value: 1.00
  - id: M3Fil.a2
    check: max_width
    layers: [Metal3.filler]
    value: 5.00
  - id: M3Fil.b
    check: min_space
    layers: [Metal3.filler]
    value: 0.42
  - id: M3Fil.c
    check: min_space
    layers: [Metal3.filler, Metal3]
    value: 0.42
  - id: M3Fil.d
    check: min_space
    layers: [Metal3.filler, TRANS]
    value: 1.00
  - id: M3Fil.h
    check: min_windowed_density
    layers: [Metal3, Metal3.filler, Metal3.mask]
    value: 25.00
    params:
      window: 800.0
      boundary_layer: 39
      boundary_datatype: 4
  - id: M3Fil.k
    check: max_windowed_density
    layers: [Metal3, Metal3.filler, Metal3.mask]
    value: 75.00
    params:
      window: 800.0
      boundary_layer: 39
      boundary_datatype: 4
