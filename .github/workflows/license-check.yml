# This workflow checks for missing license or copyright identifiers

name: License Check

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. new pushes to a PR branch).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Setup Python
        uses: actions/setup-python@v2

      - name: Install REUSE
        run: |
          python -m pip install --upgrade pip
          pip install reuse

      - name: Check License
        run: |
          reuse lint
